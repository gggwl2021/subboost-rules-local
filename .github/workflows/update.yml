name: Update Rules

on:
  workflow_dispatch:
  schedule:
    - cron: "25 9 * * *"

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install zstd
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: Build rules
        run: python3 scripts/update_rules.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add geo README.md .gitignore scripts .github/workflows/update.yml
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: update rules"
          git push
